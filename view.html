<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的砍价活动</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: system-ui, sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 100%; }
        .card { background: white; border-radius: 28px; overflow: hidden; margin-bottom: 16px; }
        .header { background: linear-gradient(135deg, #ff4d4f, #e33e3f); padding: 20px; text-align: center; color: white; }
        .product-img { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 20px; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .price-panel { background: rgba(0,0,0,0.2); border-radius: 60px; padding: 8px 16px; display: flex; justify-content: space-between; margin-top: 12px; }
        .remain-number { font-size: 28px; font-weight: 800; }
        .progress-section { padding: 20px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 600; }
        .cut-total { color: #ff4d4f; font-size: 20px; transition: all 0.2s; }
        @keyframes moneyPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); background-color: #ff4d4f; color: white; } 100% { transform: scale(1); } }
        @keyframes shakeGlow { 0% { transform: translateX(0); } 25% { transform: translateX(-3px); } 50% { transform: translateX(3px); } 100% { transform: translateX(0); } }
        .animate-pulse { animation: moneyPulse 0.5s ease forwards; }
        .animate-shake { animation: shakeGlow 0.4s ease-in-out; }
        .progress-bar-bg { background: #f0f0f0; border-radius: 20px; height: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff7e5e, #ff4d4f); transition: width 0.3s; }
        .share-area { background: #fefaf8; margin: 12px; border-radius: 28px; padding: 20px; text-align: center; }
        .share-link-box { background: white; border: 1px solid #ffe1d4; border-radius: 60px; padding: 10px 16px; display: flex; justify-content: space-between; margin-bottom: 12px; }
        .share-link-box input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; }
        .copy-btn { background: #ff4d4f; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .records-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .record-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 1px solid #f5e6de; }
        .avatar { width: 40px; height: 40px; background: #ffe0d4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .toast-message { position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); color: #ffd966; padding: 12px 24px; border-radius: 60px; font-size: 16px; z-index: 1000; white-space: nowrap; animation: fadeUp 0.25s ease; pointer-events: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-mask.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: white;
            width: 280px;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-content {
            margin-top: 8px;
            font-size: 16px;
            line-height: 1.4;
        }
        .error-box { background: #fff0f0; border: 1px solid #ffcccc; padding: 20px; border-radius: 20px; margin: 20px; text-align: center; color: #d32f2f; }
    </style>
</head>
<body>
<div class="container" id="app"><div style="text-align:center; padding:40px;">加载中...</div></div>
<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const activityId = urlParams.get('activity_id');
        const userName = decodeURIComponent(urlParams.get('user_name') || '');
        if (!activityId) {
            document.getElementById('app').innerHTML = '<div class="error-box">无效的活动链接</div>';
            return;
        }
        const SUPABASE_URL = 'https://sqhcbwqrpyzglbcclzzj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_C0A-S0tnUrJFtwa8D09WMg_dZo9h4hb';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentActivity, currentProduct, totalCut = 0, remain = 0, isCompleted = false, records = [];

        function showModal(message) {
            let modalDiv = document.getElementById('successModal');
            if (!modalDiv) {
                modalDiv = document.createElement('div');
                modalDiv.id = 'successModal';
                modalDiv.className = 'modal-mask';
                modalDiv.innerHTML = `<div class="modal-container"><span class="modal-close">&times;</span><div class="modal-content"></div></div>`;
                document.body.appendChild(modalDiv);
                modalDiv.querySelector('.modal-close').addEventListener('click', () => modalDiv.classList.remove('show'));
                modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.classList.remove('show'); });
            }
            modalDiv.querySelector('.modal-content').innerText = message;
            modalDiv.classList.add('show');
        }

        function showToast(msg, duration = 2000) {
            let old = document.querySelector('.toast-message');
            if (old) old.remove();
            let toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        async function loadData() {
            try {
                const { data: act, error: aErr } = await supabase.from('activities').select('*').eq('id', activityId).single();
                if (aErr) throw new Error('活动不存在');
                currentActivity = act;
                const { data: prod, error: pErr } = await supabase.from('products').select('*').eq('id', act.product_id).single();
                if (pErr) throw new Error('商品不存在');
                currentProduct = prod;
                const { data: cuts } = await supabase.from('cuts').select('*').eq('activity_id', activityId).order('created_at', { ascending: false });
                records = cuts || [];
                const uniqueUsers = new Set(records.map(r => r.user_id));
                totalCut = records.reduce((s,r)=>s+r.cut_amount,0);
                remain = Math.max(0, currentProduct.original_price - totalCut);
                isCompleted = (uniqueUsers.size >= currentActivity.target_people) || (remain <= 0.01);
                render();
                // 每次进入页面，如果活动已成功，都显示弹窗
                if (isCompleted) {
                    let successMsg = currentProduct.success_message || '🏆 恭喜！{people}人已到齐，免费拿{product}！🏆';
                    successMsg = successMsg.replace(/\{people\}/g, currentActivity.target_people).replace(/\{product\}/g, currentProduct.name);
                    showModal(successMsg);
                }
            } catch(e) {
                document.getElementById('app').innerHTML = `<div class="error-box">加载失败：${e.message}</div>`;
            }
        }

        function render() {
            const percent = (totalCut / currentProduct.original_price) * 100;
            const shareUrl = `https://nsqb159.github.io/pss/help.html?activity_id=${activityId}&user_name=${encodeURIComponent(userName)}`;
            const viewUrl = window.location.href;
            let recordsHtml = records.length ? records.map(r => `<li class="record-item"><div class="avatar">${r.avatar||'🔪'}</div><div>${r.nickname}</div><div style="flex:1;text-align:right;">-¥${r.cut_amount.toFixed(2)}</div></li>`).join('') : '<li style="padding:16px;text-align:center;">暂无帮砍记录</li>';
            document.getElementById('app').innerHTML = `
                <div class="card"><div class="header"><div class="product-img"><img src="${currentProduct.image_url||'https://picsum.photos/id/20/200/200'}"></div><div class="product-title">${currentProduct.name}</div><div class="price-panel"><div>还差 <span class="remain-number">${remain.toFixed(2)}</span> 元</div><div>原价 ¥${currentProduct.original_price.toFixed(2)}</div></div></div>
                <div class="progress-section"><div class="stats-row"><span>已砍总金额</span><span class="cut-total" id="cutAmount">¥${totalCut.toFixed(2)}</span></div><div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%"></div></div></div></div>
                <div class="share-area"><div class="share-title">📢 分享给好友帮砍</div><div class="share-link-box"><input type="text" id="shareLink" value="${shareUrl}" readonly><button class="copy-btn" id="copyShare">复制</button></div><div class="share-link-box"><input type="text" value="${viewUrl}" readonly><button class="copy-btn" id="copyView">复制查看链接</button></div><div style="font-size:12px; margin-top:8px;">🔗 请保存好本页面链接，可随时查看进度</div></div>
                <div class="card"><div style="padding:16px; font-weight:600;">👥 帮砍记录</div><ul class="records-list">${recordsHtml}</ul></div>
            `;
            document.getElementById('copyShare')?.addEventListener('click',()=>{ document.getElementById('shareLink').select(); document.execCommand('copy'); showToast('帮砍链接已复制'); });
            document.getElementById('copyView')?.addEventListener('click',()=>{ navigator.clipboard.writeText(viewUrl); showToast('查看链接已复制'); });
        }

        loadData();
        // 实时订阅砍价记录变化（当有新砍价时刷新数据，如果刚变成成功状态也会弹窗）
        supabase.channel(`cuts_${activityId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'cuts', filter: `activity_id=eq.${activityId}` }, () => { loadData(); }).subscribe();
    })();
</script>
</body>
</html>
