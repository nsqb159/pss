<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砍一刀后台管理 · 增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: system-ui, sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        h2 { margin-bottom: 20px; color: #e33e3f; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 16px; font-size: 14px; }
        textarea { min-height: 60px; resize: vertical; }
        button { background: #e33e3f; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin-right: 8px; font-size: 14px; transition: 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-small { padding: 4px 12px; font-size: 12px; }
        .btn-danger { background: #d9534f; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #f0ad4e; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; overflow-x: auto; display: block; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; vertical-align: top; }
        .actions button { margin: 0 4px 4px 0; }
        .preview-img { max-width: 50px; max-height: 50px; border-radius: 8px; margin-top: 4px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #ffd966; padding: 8px 20px; border-radius: 40px; z-index: 1000; font-size: 14px; }
        @media (max-width: 768px) { th, td { font-size: 12px; } input { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card"><h2>🔪 砍一刀后台管理（增强版）</h2><div>管理商品、成功文案、活动及重置</div></div>
    <div class="card"><h2>📦 商品管理</h2><div id="productsPanel">加载中...</div></div>
    <div class="card"><h2>📋 活动管理</h2><div id="activitiesPanel">加载中...</div></div>
</div>
<script>
    (function() {
        const SUPABASE_URL = 'https://sqhcbwqrpyzglbcclzzj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_C0A-S0tnUrJFtwa8D09WMg_dZo9h4hb';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showToast(msg) {
            let t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ---------- 商品管理 ----------
        async function loadProducts() {
            const { data, error } = await supabase.from('products').select('*').order('id');
            if (error) {
                document.getElementById('productsPanel').innerHTML = '加载失败';
                return;
            }
            let html = `<table><th>ID</th><th>名称</th><th>原价</th><th>目标人数</th><th>图片链接</th><th>成功文案</th><th>操作</th></tr>`;
            for (let p of data) {
                html += `<tr>
                    <td>${p.id}</td>
                    <td><input type="text" id="name_${p.id}" value="${escapeHtml(p.name)}" style="width:120px;"></td>
                    <td><input type="number" id="price_${p.id}" step="0.01" value="${p.original_price}" style="width:100px;"></td>
                    <td><input type="number" id="target_${p.id}" value="${p.default_target_people}" style="width:80px;"></td>
                    <td>
                        <input type="text" id="img_${p.id}" value="${p.image_url || ''}" style="width:150px;">
                        <div id="preview_${p.id}" class="preview-img"></div>
                    </td>
                    <td><textarea id="msg_${p.id}" rows="2" style="width:180px;">${escapeHtml(p.success_message || '')}</textarea></td>
                    <td class="actions">
                        <button class="btn-small" onclick="window.updateProduct(${p.id})">保存</button>
                        <button class="btn-small btn-danger" onclick="window.deleteProduct(${p.id})">删除</button>
                    </td>
                </tr>`;
                if (p.image_url) {
                    setTimeout(() => {
                        const previewDiv = document.getElementById(`preview_${p.id}`);
                        if (previewDiv) previewDiv.innerHTML = `<img src="${p.image_url}" style="max-width:50px; max-height:50px; border-radius:8px;" onerror="this.style.display='none'">`;
                    }, 0);
                }
            }
            html += `<tr><td colspan="7"><button id="addProductBtn" class="btn-success">➕ 添加商品</button></td></tr>`;
            document.getElementById('productsPanel').innerHTML = html;
            document.getElementById('addProductBtn')?.addEventListener('click', addProduct);
            for (let p of data) {
                const imgInput = document.getElementById(`img_${p.id}`);
                if (imgInput) {
                    imgInput.addEventListener('change', function() {
                        const previewDiv = document.getElementById(`preview_${p.id}`);
                        if (previewDiv) previewDiv.innerHTML = this.value ? `<img src="${this.value}" style="max-width:50px; border-radius:8px;" onerror="this.style.display='none'">` : '';
                    });
                }
            }
        }

        window.updateProduct = async function(id) {
            const name = document.getElementById(`name_${id}`).value;
            const price = parseFloat(document.getElementById(`price_${id}`).value);
            const target = parseInt(document.getElementById(`target_${id}`).value);
            const image = document.getElementById(`img_${id}`).value;
            const message = document.getElementById(`msg_${id}`).value;
            if (!name || isNaN(price) || isNaN(target)) { alert('请完整填写名称、价格、目标人数'); return; }
            const { error } = await supabase.from('products').update({
                name, original_price: price, default_target_people: target, image_url: image, success_message: message
            }).eq('id', id);
            if (error) alert('更新失败：' + error.message);
            else { showToast('商品已更新'); loadProducts(); loadActivities(); }
        };

        window.deleteProduct = async function(id) {
            if (!confirm('删除商品会同时删除相关的所有砍价活动及记录，确定吗？')) return;
            const { error } = await supabase.from('products').delete().eq('id', id);
            if (error) alert('删除失败：' + error.message);
            else { showToast('商品已删除'); loadProducts(); loadActivities(); }
        };

        async function addProduct() {
            const { error } = await supabase.from('products').insert({
                name: '新商品',
                original_price: 199,
                default_target_people: 5,
                image_url: '',
                success_message: '🏆 恭喜！{people}人已到齐，免费拿{product}！🏆'
            });
            if (error) alert('添加失败：' + error.message);
            else { showToast('已添加新商品'); loadProducts(); }
        }

        // ---------- 活动管理（增加发起人显示） ----------
        async function loadActivities() {
            const { data: acts, error } = await supabase
                .from('activities')
                .select('*, products(name)')
                .order('created_at', { ascending: false });
            if (error) {
                document.getElementById('activitiesPanel').innerHTML = '加载失败';
                return;
            }
            if (!acts.length) {
                document.getElementById('activitiesPanel').innerHTML = '<div>暂无活动</div>';
                return;
            }
            let html = `<table>
                <th>活动ID</th><th>发起人</th><th>商品</th><th>当前人数</th><th>已砍金额</th><th>目标人数</th><th>状态</th><th>操作</th>
            </tr>`;
            for (let a of acts) {
                html += `<tr>
                    <td>${a.id.slice(0,8)}...${a.id.slice(-4)}</td>
                    <td>${escapeHtml(a.created_by || '匿名')}</td>
                    <td>${a.products?.name || '-'}</td>
                    <td>${a.current_people}</td>
                    <td>¥${a.total_cut.toFixed(2)}</td>
                    <td><input type="number" id="target_act_${a.id}" value="${a.target_people}" style="width:80px;"></td>
                    <td>${a.status}</td>
                    <td class="actions">
                        <button class="btn-small" onclick="window.updateActivityTarget('${a.id}')">修改人数</button>
                        <button class="btn-small btn-warning" onclick="window.resetActivity('${a.id}')">重置砍价</button>
                        <button class="btn-small btn-danger" onclick="window.deleteActivity('${a.id}')">删除活动</button>
                    </td>
                </tr>`;
            }
            document.getElementById('activitiesPanel').innerHTML = html;
        }

        window.updateActivityTarget = async function(activityId) {
            const newTarget = parseInt(document.getElementById(`target_act_${activityId}`).value);
            if (isNaN(newTarget) || newTarget < 1) { alert('请输入有效人数'); return; }
            const { error } = await supabase.from('activities').update({ target_people: newTarget }).eq('id', activityId);
            if (error) alert('修改失败：' + error.message);
            else { showToast('目标人数已更新'); loadActivities(); }
        };

        window.resetActivity = async function(activityId) {
            if (!confirm('重置将删除该活动的所有砍价记录，当前进度归零，确定吗？')) return;
            const { data, error } = await supabase.rpc('reset_activity', { p_activity_id: activityId });
            if (error) {
                alert('重置失败：' + error.message);
                if (error.message.includes('function') || error.message.includes('relation')) {
                    if (confirm('reset_activity 函数不存在，是否手动删除砍价记录并重置活动？')) {
                        await supabase.from('cuts').delete().eq('activity_id', activityId);
                        await supabase.from('activities').update({ current_people: 0, total_cut: 0, status: 'active' }).eq('id', activityId);
                        showToast('已手动重置');
                        loadActivities();
                    }
                }
            } else {
                showToast('活动已重置，砍价记录已清空');
                loadActivities();
            }
        };

        window.deleteActivity = async function(activityId) {
            if (!confirm('删除活动将同时删除所有砍价记录，确定吗？')) return;
            const { error } = await supabase.from('activities').delete().eq('id', activityId);
            if (error) alert('删除失败：' + error.message);
            else { showToast('活动已删除'); loadActivities(); }
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }

        loadProducts();
        loadActivities();
    })();
</script>
</body>
</html>
